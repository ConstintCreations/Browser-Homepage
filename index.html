<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Home</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

        <link rel="stylesheet" href="style.css">
        <script defer src="background.js"></script>
        <script defer src="commits.js"></script>
        <script defer src="clock.js"></script>
        <script defer src="weather.js"></script>
    </head>
    <body>
        <div class="background">
            <div class="grid">
                <div class="time-weather-container">
                    <div class="time">00:00</div>
                    <div class="weather">
                        <div class="wi"></div>
                        |
                        <div class="temperature">
                            <p class="temperature-value"></p>
                            <div class="high-low">
                                <div class="high"></div>
                                <hr class="high-low-divider">
                                <div class="low"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="searchBar">

                </div>

                <div class="footer">
                    <div>
                        <div class="commits">
                            <a href="https://github.com/repos?q=owner%3A%40me+sort%3Aupdated" class="github-logo-link"><img class="logo" width="36px" src="logos/github.svg"></a>
                            <div class="github-username">
                                <input id="github-username-input" type="text" placeholder="Github Username"><button class="github-username-button">	&#x2714;</button>
                            </div>
                            <div class="commit-tracker">
                                <div class="last-commits">
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>

                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                    <div class="commit-box"></div>
                                </div>
                                <div class="commit-info">
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
