<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Home</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

        <link rel="stylesheet" href="style.css">
        <script defer src="background.js"></script>
        <script defer src="commits.js"></script>
        <script defer src="chess.js"></script>
        <script defer src="clock.js"></script>
        <script defer src="weather.js"></script>
    </head>
    <body>
        <div class="background">
            <div class="grid">
                <div class="time-weather-container">
                    <div class="time">00:00</div>
                    <div class="weather">
                        <div class="wi"></div>
                        |
                        <div class="temperature">
                            <p class="temperature-value"></p>
                            <div class="high-low">
                                <div class="high"></div>
                                <hr class="high-low-divider">
                                <div class="low"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="searchBarArea">
                    <form id="searchForm" action="https://www.google.com/search" method="get" target="_blank">
                        <input name="q" autocomplete="off" spellcheck="false" type="text" id="searchBar" placeholder="Search...">
                        <button type="submit" id="submitButton"><img width="24px" src="icons/search.svg"></button>
                    </form>
                </div>

                <div class="footer">
                    <div class="commits footer-stats">
                        <a href="https://github.com/repos?q=owner%3A%40me+sort%3Aupdated" target="_blank" class="logo-link github-logo-link"><img class="logo" width="36px" src="icons/github.svg"></a>
                        <div class="username github-username">
                            <input autocomplete="off" spellcheck="false" class="username-input" id="github-username-input" type="text" placeholder="Github Username"><button class="username-button github-username-button">&#x2714;</button>
                        </div>
                        <div class="commit-tracker footer-data">
                            <div class="last-commits">
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>

                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                                <div class="commit-box"></div>
                            </div>
                        </div>
                    </div>
                    <div class="chess-stats footer-stats">
                        <a href="chess.com/home" target="_blank" class="logo-link chess-logo-link"><img class="logo" height="36px" src="icons/chess.com.png"></a>
                        <div class="username chess-username">
                            <input autocomplete="off" spellcheck="false" class="username-input" id="chess-username-input" type="text" placeholder="Chess.com Username"><button class="username-button chess-username-button">&#x2714;</button>
                        </div>
                        <div class="chess-data footer-data">
                            <img class="chess-game-icon" src="icons/chess/rapid.svg">
                            <div class="chess-rating"></div>
                            <div class="chess-divider">|</div>
                            <div class="chess-win-draw-loss-record">
                                <div class="win"></div>
                                <div class="draw"></div>
                                <div class="loss"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
